<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQL TECH — Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            50:  '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0',
                            300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b',
                            600: '#475569', 700: '#334155', 800: '#1e293b',
                            900: '#0f172a', 950: '#020617',
                        },
                        accent: {
                            DEFAULT: '#667eea', light: '#818cf8',
                            dark: '#4f46e5', glow: 'rgba(102,126,234,0.25)',
                        },
                        purple: { DEFAULT: '#764ba2', light: '#a78bfa' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%      { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        .bg-grid {
            background-image:
                linear-gradient(rgba(102,126,234,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102,126,234,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body class="dark bg-dark-950 text-dark-200 font-sans min-h-screen flex items-center justify-center bg-grid relative overflow-hidden">

    <!-- Background Glow Orbs -->
    <div class="glow-orb w-96 h-96 bg-accent top-[-10%] left-[-10%] animate-float"></div>
    <div class="glow-orb w-80 h-80 bg-purple bottom-[-10%] right-[-10%]" style="animation: float 8s ease-in-out infinite reverse;"></div>

    <!-- Login Card -->
    <div class="animate-fade-in-up relative z-10 w-full max-w-md mx-4">

        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-accent to-purple shadow-lg shadow-accent/30 mb-4">
                <span class="text-white font-bold text-xl">XQL</span>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">XQL TECH</h1>
            <p class="text-sm text-dark-400 mt-1">Admin Dashboard Login</p>
        </div>

        <!-- Login Form Card -->
        <div class="bg-dark-900/80 backdrop-blur-xl rounded-2xl border border-dark-700/50 shadow-2xl shadow-black/20 p-8">

            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">

                <!-- Username -->
                <div>
                    <label class="block text-xs font-medium text-dark-400 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-dark-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </span>
                        <input type="text" id="username" name="username" required placeholder="Masukkan username"
                            class="form-input w-full pl-10 pr-4 py-2.5 rounded-xl bg-dark-800 border border-dark-700 text-sm text-dark-200 placeholder-dark-500 transition">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs font-medium text-dark-400 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-dark-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </span>
                        <input type="password" id="password" name="password" required placeholder="Masukkan password"
                            class="form-input w-full pl-10 pr-10 py-2.5 rounded-xl bg-dark-800 border border-dark-700 text-sm text-dark-200 placeholder-dark-500 transition">
                        <!-- Toggle Password Visibility -->
                        <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-dark-500 hover:text-dark-300 transition">
                            <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-dark-600 bg-dark-800 text-accent focus:ring-accent/30 focus:ring-offset-0 cursor-pointer">
                        <span class="text-xs text-dark-400">Ingat saya</span>
                    </label>
                </div>

                <!-- Error Message -->
                <div id="loginError" class="hidden items-center gap-2 px-3 py-2.5 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium">
                    <span>❌</span>
                    <span id="loginErrorText">Username atau password salah!</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn"
                    class="w-full py-2.5 rounded-xl bg-gradient-to-r from-accent to-purple text-white text-sm font-semibold shadow-lg shadow-accent/20 hover:shadow-accent/40 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                    <span id="loginBtnText">Masuk ke Dashboard</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px bg-dark-700/50"></div>
                <span class="text-[10px] text-dark-500 uppercase tracking-widest font-medium">Info</span>
                <div class="flex-1 h-px bg-dark-700/50"></div>
            </div>

            <!-- Default Credentials Info -->
            <div class="bg-dark-800/50 rounded-xl p-4 border border-dark-700/30">
                <p class="text-[11px] text-dark-400 font-medium mb-2">🔑 Kredensial Default (Demo):</p>
                <div class="space-y-1">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-dark-500 w-16">Username:</span>
                        <code class="text-[11px] text-accent font-mono bg-dark-900 px-2 py-0.5 rounded">admin</code>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-dark-500 w-16">Password:</span>
                        <code class="text-[11px] text-accent font-mono bg-dark-900 px-2 py-0.5 rounded">admin123</code>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-[11px] text-dark-500 mt-6">
            &copy; 2026 XQL TECH. Authorized access only.
        </p>
    </div>

    <script>
        // ============================================================
        // LOGIN HANDLER
        // ============================================================

        /**
         * handleLogin(event)
         * Memvalidasi kredensial dan mengarahkan ke dashboard jika berhasil.
         *
         * ──────────────────────────────────────────────────────────────
         * CATATAN PENTING — INTEGRASI BACKEND:
         * Saat ini login menggunakan kredensial hardcoded (demo).
         * Untuk produksi, GANTI bagian validasi dengan API call:
         *
         * const response = await fetch('/api/auth/login', {
         *     method: 'POST',
         *     headers: { 'Content-Type': 'application/json' },
         *     body: JSON.stringify({ username, password })
         * });
         * const data = await response.json();
         * if (data.success) {
         *     localStorage.setItem('auth_token', data.token);
         *     window.location.href = 'admin-dashboard.html';
         * }
         * ──────────────────────────────────────────────────────────────
         */
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');

            // Sembunyikan error sebelumnya
            errorDiv.classList.add('hidden');

            // Tampilkan loading state
            btn.disabled = true;
            btnText.textContent = 'Memverifikasi...';

            // Simulasi delay verifikasi (800ms)
            setTimeout(() => {

                // ──────────────────────────────────────────────────
                // KREDENSIAL DEMO (HARDCODED)
                // Ganti bagian ini dengan API call ke backend Anda
                // ──────────────────────────────────────────────────
                const validCredentials = [
                    { username: 'admin',    password: 'admin123' },
                    { username: 'xqltech',  password: 'xql2026'  }
                ];

                const isValid = validCredentials.some(
                    c => c.username === username && c.password === password
                );

                if (isValid) {
                    // ── LOGIN BERHASIL ──
                    // Simpan status login ke sessionStorage (atau localStorage jika "Remember Me" dicentang)
                    const sessionData = {
                        loggedIn: true,
                        username: username,
                        loginTime: new Date().toISOString()
                    };

                    if (rememberMe) {
                        localStorage.setItem('xql_admin_session', JSON.stringify(sessionData));
                    } else {
                        sessionStorage.setItem('xql_admin_session', JSON.stringify(sessionData));
                    }

                    // Redirect ke dashboard
                    btnText.textContent = 'Berhasil! Mengalihkan...';
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 500);

                } else {
                    // ── LOGIN GAGAL ──
                    btn.disabled = false;
                    btnText.textContent = 'Masuk ke Dashboard';
                    errorText.textContent = 'Username atau password salah! Silakan coba lagi.';
                    errorDiv.classList.remove('hidden');

                    // Shake animation pada form
                    const form = document.getElementById('loginForm');
                    form.style.animation = 'none';
                    form.offsetHeight; // trigger reflow
                    form.style.animation = 'shake 0.4s ease';
                }

            }, 800);
        }

        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        // Shake animation CSS (injected)
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%      { transform: translateX(-8px); }
                40%      { transform: translateX(8px); }
                60%      { transform: translateX(-4px); }
                80%      { transform: translateX(4px); }
            }
        `;
        document.head.appendChild(shakeStyle);

        // Cek apakah user sudah login (auto-redirect ke dashboard)
        (function checkExistingSession() {
            const session = localStorage.getItem('xql_admin_session') || sessionStorage.getItem('xql_admin_session');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.loggedIn) {
                        window.location.href = 'admin-dashboard.html';
                    }
                } catch(e) { /* ignore */ }
            }
        })();
    </script>
</body>
</html>
